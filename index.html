<!doctype html>
<html lang="en" data-theme="dark">

    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="canonical" href="https://graphon.co" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111318" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <!-- Preconnect to Google Fonts servers so the font request starts immediately -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Material Symbols loaded as early as possible; display=block hides text until font arrives -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    <!-- Body text fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
    <title>Graphon — eBPF Kubernetes Dependency Mapping</title>
    <meta name="description" content="Graphon uses eBPF to build a live Kubernetes service dependency graph without code changes or sidecars. Detect drift, analyze blast radius, and understand your infrastructure." />
    <meta property="og:title" content="Graphon — eBPF Kubernetes Dependency Mapping" />
    <meta property="og:description" content="Build a live Kubernetes service dependency graph with eBPF—without code changes or sidecars." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://graphon.co" />
    <meta property="og:image" content="https://graphon.co/og-image.png" />

    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Graphon" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Graphon — eBPF Kubernetes Dependency Mapping" />
    <meta name="twitter:description" content="Build a live Kubernetes service dependency graph with eBPF—without code changes or sidecars." />
    <meta name="twitter:image" content="https://graphon.co/og-image.png" />
    <script type="application/ld+json" data-graphon-seo>
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://graphon.co/#organization",
            "name": "Graphon",
            "url": "https://graphon.co",
            "logo": "https://graphon.co/favicon.png",
            "sameAs": ["https://github.com/retr0-kernel/graphon-helm"]
          },
          {
            "@type": "WebSite",
            "@id": "https://graphon.co/#website",
            "url": "https://graphon.co",
            "name": "Graphon",
            "publisher": { "@id": "https://graphon.co/#organization" },
            "inLanguage": "en-US"
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://graphon.co/#software",
            "name": "Graphon",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "Kubernetes",
            "url": "https://graphon.co",
            "description": "eBPF-powered Kubernetes service dependency mapping without code changes or sidecars.",
            "downloadUrl": "https://github.com/retr0-kernel/graphon-helm",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
          }
        ]
      }
    </script>
    <!-- Hide Material Symbol spans until the icon font binary has loaded.
         Without this, the raw ligature text ("dark_mode", "code", etc.) flashes
         briefly in the fallback font before Material Symbols kicks in. -->
    <style>
      html:not(.ms-ready) .material-symbols-outlined { visibility: hidden; }
    </style>
    <!-- Theme flash prevention + icon-font guard, both run before first paint -->
    <script>
      (function(){
        var d = document.documentElement;

        // 1. Apply saved theme immediately so there is no colour flash
        var t = localStorage.getItem('graphon-theme') || 'dark';
        if (t === 'system') t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        d.setAttribute('data-theme', t);
        if (t === 'dark') d.classList.add('dark');

        // 2. Reveal icons only once Material Symbols has finished loading.
        //    Fallback: reveal after 2 s so icons are never permanently hidden.
        var reveal = function() { d.classList.add('ms-ready'); };
        var timer  = setTimeout(reveal, 2000);
        document.fonts.ready.then(function() { clearTimeout(timer); reveal(); });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
